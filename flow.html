<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humanity Safety — System Architecture</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-primary, #0d0d0d);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .flow-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .flow-card {
      background: var(--bg-card, #12121f);
      border: 1px solid var(--border-subtle, rgba(255, 255, 255, 0.06));
      border-radius: var(--radius-xl, 24px);
      padding: 2.5rem;
      width: 100%;
      max-width: 780px;
      box-shadow: var(--shadow-elevated, 0 20px 60px rgba(0, 0, 0, 0.5));
      position: relative;
    }

    .flow-card svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .flow-title {
      text-align: center;
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 800;
      color: var(--text-primary, #eef2ff);
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="index.html" class="logo" aria-label="Humanity Safety Home">

        <li><a href="flow.html" class="active">Work Flow</a></li>

    </nav>
  </header>
